name: Bug report
description: Report a problem with one of the tools or the docs
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For anything security-related, please use the
        [security policy](../blob/main/SECURITY.md) instead of a public issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you run, what did you expect, and what did you get?
      placeholder: |
        Command: python tools/score_submission.py ...
        Expected: ...
        Got: ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest CSV and command that shows the problem.
      render: shell
    validations:
      required: false
  - type: input
    id: env
    attributes:
      label: Environment
      description: OS, Python version, pandas/numpy versions.
      placeholder: "Windows 11, Python 3.12, pandas 2.2.3, numpy 2.1.3"
    validations:
      required: false
